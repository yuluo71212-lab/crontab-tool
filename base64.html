  <script src="i18n.js"></script>
  <script>
  (function () {
    'use strict';
    var t = window.t;

    // 状态缓存，用于 langchange 时重新渲染
    var lastStatusType = 'info';
    var lastStatusMsg  = '';

    document.addEventListener('langchange', function () { updateStats(); renderStatus(); });

    // ============================================================
    // DOM 引用
    // ============================================================
    var inputArea   = document.getElementById('input-area');
    var outputArea  = document.getElementById('output-area');
    var statusBar   = document.getElementById('status-bar');
    var inputStats  = document.getElementById('input-stats');
    var outputStats = document.getElementById('output-stats');
    var outputLabel = document.getElementById('output-label');
    var btnEncode   = document.getElementById('btn-encode');
    var btnDecode   = document.getElementById('btn-decode');
    var btnSwap     = document.getElementById('btn-swap');
    var btnClear    = document.getElementById('btn-clear');
    var btnCopy     = document.getElementById('btn-copy');

    // ============================================================
    // localStorage 持久化
    // ============================================================
    var STORAGE_KEY = 'base64_input';

    function loadInput() {
      try {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) { inputArea.value = saved; updateInputStats(); }
      } catch(e) {}
    }
    function saveInput(val) {
      try { localStorage.setItem(STORAGE_KEY, val); } catch(e) {}
    }

    // ============================================================
    // 统计更新
    // ============================================================
    function updateInputStats() {
      var val = inputArea.value;
      var chars = val.length;
      var lines = chars === 0 ? 1 : val.split('\n').length;
      inputStats.textContent = t('base64.stats_format', { chars: chars, lines: lines });
    }

    function updateOutputStats(text) {
      var txt = text || '';
      var chars = txt.length;
      var lines = chars === 0 ? 1 : txt.split('\n').length;
      outputStats.textContent = t('base64.stats_format', { chars: chars, lines: lines });
    }

    function updateStats() {
      updateInputStats();
      updateOutputStats(outputArea.value);
    }

    // ============================================================
    // Base64 编解码核心
    // ============================================================
    function encodeBase64(str) {
      var encoder = new TextEncoder();
      var bytes = encoder.encode(str);
      var binary = '';
      for (var i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      return btoa(binary);
    }

    function decodeBase64(str) {
      // 去除所有空白字符
      var cleaned = str.replace(/\s/g, '');

      if (cleaned.length === 0) {
        throw new Error(t('base64.err_empty'));
      }

      // 检查是否包含非 Base64 字符
      if (!/^[A-Za-z0-9+/]*={0,2}$/.test(cleaned)) {
        // 定位第一个非法字符
        var badChar = cleaned.match(/[^A-Za-z0-9+/=]/);
        if (badChar) {
          throw new Error(t('base64.err_bad_char', { char: badChar[0] }));
        }
        throw new Error(t('base64.err_invalid'));
      }

      // 检查 = 号位置：只能出现在末尾
      if (/=(?!=*$)/.test(cleaned)) {
        throw new Error(t('base64.err_padding'));
      }

      // 检查长度：Base64 长度必须是 4 的倍数
      if (cleaned.length % 4 !== 0) {
        throw new Error(t('base64.err_length', { len: cleaned.length }));
      }

      try {
        var binary = atob(cleaned);
        var bytes = new Uint8Array(binary.length);
        for (var j = 0; j < binary.length; j++) {
          bytes[j] = binary.charCodeAt(j);
        }
        var decoded = new TextDecoder('utf-8').decode(bytes);
        return decoded;
      } catch (e) {
        throw new Error(t('base64.err_decode'));
      }
    }

    // ============================================================
    // 编码操作
    // ============================================================
    function doEncode() {
      var input = inputArea.value;
      if (!input) {
        showStatus('warning', t('base64.status_empty_input'));
        return;
      }

      try {
        var result = encodeBase64(input);
        outputArea.value = result;
        outputLabel.innerHTML = '<span class="text-success">' + t('base64.status_encode_ok') + '</span>';
        updateOutputStats(result);
        showStatus('success', t('base64.msg_encode_ok'));
      } catch (e) {
        outputArea.value = '';
        outputLabel.innerHTML = '<span class="text-error">' + t('base64.status_encode_fail') + '</span>';
        updateOutputStats('');
        showStatus('error', t('base64.status_encode_fail') + ': ' + e.message);
      }
    }

    // ============================================================
    // 解码操作
    // ============================================================
    function doDecode() {
      var input = inputArea.value.trim();
      if (!input) {
        showStatus('warning', t('base64.status_empty_decode'));
        return;
      }

      try {
        var result = decodeBase64(input);
        outputArea.value = result;
        outputLabel.innerHTML = '<span class="text-success">' + t('base64.status_decode_ok') + '</span>';
        updateOutputStats(result);
        showStatus('success', t('base64.msg_decode_ok'));
      } catch (e) {
        outputArea.value = '';
        outputLabel.innerHTML = '<span class="text-error">' + t('base64.status_decode_fail') + '</span>';
        updateOutputStats('');
        showStatus('error', e.message);
      }
    }

    // ============================================================
    // 互换输入输出
    // ============================================================
    function doSwap() {
      var inputVal = inputArea.value;
      var outputVal = outputArea.value;

      if (!outputVal) {
        showStatus('warning', t('base64.status_empty_swap'));
        return;
      }

      inputArea.value = outputVal;
      outputArea.value = '';
      outputLabel.innerHTML = '<span class="text-text-muted">' + t('base64.status_swapped') + '</span>';
      updateInputStats();
      updateOutputStats('');
      saveInput(outputVal);
      showStatus('info', t('base64.msg_swap_ok'));
      setActiveButton(btnEncode, btnDecode);
    }

    // ============================================================
    // 清空
    // ============================================================
    function doClear() {
      inputArea.value = '';
      outputArea.value = '';
      outputLabel.innerHTML = '<span class="text-text-muted">' + t('base64.status_waiting') + '</span>';
      updateInputStats();
      updateOutputStats('');
      saveInput('');
      showStatus('info', t('base64.msg_cleared'));
      setActiveButton(btnEncode, btnDecode);
    }

    // ============================================================
    // 复制结果
    // ============================================================
    function doCopy() {
      var outputVal = outputArea.value;
      if (!outputVal) {
        showStatus('warning', t('base64.msg_empty_output'));
        return;
      }

      var done = function () {
        var originalText = btnCopy.textContent;
        btnCopy.textContent = t('base64.copy_done');
        btnCopy.classList.add('text-[#00B42A]', 'border-[#00B42A]');
        setTimeout(function () {
          btnCopy.textContent = originalText;
          btnCopy.classList.remove('text-[#00B42A]', 'border-[#00B42A]');
        }, 1200);
        showStatus('success', t('base64.msg_copied'));
      };

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(outputVal).then(done).catch(function () {
          fallbackCopy(outputVal, done);
        });
      } else {
        fallbackCopy(outputVal, done);
      }
    }

    function fallbackCopy(text, callback) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      try { document.execCommand('copy'); if (callback) callback(); } catch (e) {}
      document.body.removeChild(ta);
    }

    // ============================================================
    // 状态提示
    // ============================================================
    function showStatus(type, message) {
      lastStatusType = type;
      lastStatusMsg  = message;
      renderStatus();
    }

    function renderStatus() {
      var icon = '';
      var colorClass = '';
      switch (lastStatusType) {
        case 'success':
          icon = '✅';
          colorClass = 'text-success';
          break;
        case 'error':
          icon = '❌';
          colorClass = 'text-error';
          break;
        case 'warning':
          icon = '⚠️';
          colorClass = 'text-[#FF7D00]';
          break;
        case 'info':
        default:
          icon = 'ℹ️';
          colorClass = 'text-text-muted';
          break;
      }
      statusBar.innerHTML = '<span class="inline-flex items-center gap-1 ' + colorClass + ' text-sm font-medium">' +
        icon + ' ' + escapeHTML(lastStatusMsg) +
        '</span>';
    }

    // ============================================================
    // 工具函数
    // ============================================================
    function escapeHTML(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ============================================================
    // 按钮切换
    // ============================================================
    function setActiveButton(activeBtn, inactiveBtn) {
      // Active → filled blue
      activeBtn.classList.add('bg-primary', 'text-white', 'border-none');
      activeBtn.classList.remove('border', 'border-primary', 'text-primary', 'bg-white');
      // Inactive → outlined blue
      inactiveBtn.classList.remove('bg-primary', 'text-white', 'border-none');
      inactiveBtn.classList.add('border', 'border-primary', 'text-primary', 'bg-white');
    }

    // ============================================================
    // 事件绑定
    // ============================================================
    function init() {
      // 初始化状态缓存
      lastStatusMsg = t('base64.status_placeholder');

      loadInput();

      // 输入框变化时保存到 localStorage
      inputArea.addEventListener('input', function () {
        updateInputStats();
        saveInput(inputArea.value);
      });

      // 按钮事件
      btnEncode.addEventListener('click', function () {
        doEncode();
        setActiveButton(btnEncode, btnDecode);
      });
      btnDecode.addEventListener('click', function () {
        doDecode();
        setActiveButton(btnDecode, btnEncode);
      });
      btnSwap.addEventListener('click', doSwap);
      btnClear.addEventListener('click', doClear);
      btnCopy.addEventListener('click', doCopy);

      // 键盘快捷键 Ctrl+Enter = 编码
      inputArea.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          doEncode();
          setActiveButton(btnEncode, btnDecode);
        }
      });

      // 初始状态
      updateInputStats();
      updateOutputStats('');
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
  </script>
