  <script>
  (function () {
    'use strict';
    var t = window.t;
    var _currentStatus = null;
    document.addEventListener('langchange', function () { updInputStats(); updOutputStats(outputArea.value); if (_currentStatus) showStatus(_currentStatus.type, t(_currentStatus.key, _currentStatus.params)); updateOutputLabel(); });

    // ============================================================
    // XML Tokenizer — 状态机分词
    // ============================================================
    var TOK_OPEN     = 'open';      // <name attr>
    var TOK_CLOSE    = 'close';     // </name>
    var TOK_SELF     = 'self';      // <name />
    var TOK_TEXT     = 'text';      // 文本内容
    var TOK_COMMENT  = 'comment';   // <!-- -->
    var TOK_CDATA    = 'cdata';     // <![CDATA[ ]]>
    var TOK_PI       = 'pi';        // <?xml ...?>
    var TOK_DECL     = 'decl';      // <!DOCTYPE ...>

    function tokenizeXML(xml) {
      var tokens = [];
      var i = 0;
      var len = xml.length;
      var line = 1, col = 1;

      function advance(n) { for (var a = 0; a < n; a++) { if (xml[i] === '\n') { line++; col = 1; } else col++; i++; } }

      while (i < len) {
        var ch = xml[i];
        var startLine = line, startCol = col;

        if (ch === '<') {
          // 检查类型
          if (xml.substring(i, i + 4) === '<!--') {
            var end = xml.indexOf('-->', i + 4);
            if (end === -1) throw errorAt('XML 注释未闭合（缺少 -->）', line, col);
            tokens.push({ type: TOK_COMMENT, value: xml.substring(i, end + 3), line: startLine, col: startCol });
            advance(end + 3 - i);
          } else if (xml.substring(i, i + 9) === '<![CDATA[') {
            var cEnd = xml.indexOf(']]>', i + 9);
            if (cEnd === -1) throw errorAt('CDATA 段未闭合（缺少 ]]>）', line, col);
            tokens.push({ type: TOK_CDATA, value: xml.substring(i, cEnd + 3), line: startLine, col: startCol });
            advance(cEnd + 3 - i);
          } else if (xml.substring(i, i + 2) === '</') {
            var gt2 = xml.indexOf('>', i + 2);
            if (gt2 === -1) throw errorAt('闭合标签缺少 >', line, col);
            var tagName = xml.substring(i + 2, gt2).trim();
            tokens.push({ type: TOK_CLOSE, value: xml.substring(i, gt2 + 1), tagName: tagName, line: startLine, col: startCol });
            advance(gt2 + 1 - i);
          } else if (xml.substring(i, i + 2) === '<?') {
            var piEnd = xml.indexOf('?>', i + 2);
            if (piEnd === -1) throw errorAt('XML 处理指令未闭合（缺少 ?>）', line, col);
            tokens.push({ type: TOK_PI, value: xml.substring(i, piEnd + 2), line: startLine, col: startCol });
            advance(piEnd + 2 - i);
          } else if (xml.substring(i, i + 2) === '<!') {
            var declEnd = xml.indexOf('>', i + 2);
            if (declEnd === -1) throw errorAt('DOCTYPE 声明缺少 >', line, col);
            tokens.push({ type: TOK_DECL, value: xml.substring(i, declEnd + 1), line: startLine, col: startCol });
            advance(declEnd + 1 - i);
          } else {
            // 开始标签或自闭合标签
            var gt = xml.indexOf('>', i + 1);
            if (gt === -1) throw errorAt('标签缺少 >', line, col);
            var raw = xml.substring(i, gt + 1);

            // 自闭合？
            var isSelfClosing = raw.length > 2 && raw[raw.length - 2] === '/';
            // 提取标签名
            var inner = raw.substring(1, isSelfClosing ? raw.length - 2 : raw.length - 1).trim();
            var spaceIdx = inner.search(/\s/);
            var tName = spaceIdx === -1 ? inner : inner.substring(0, spaceIdx);

            if (!/^[a-zA-Z_][\w\-.]*$/.test(tName)) {
              throw errorAt('标签名 "' + tName + '" 不符合 XML 命名规范', line, col);
            }

            tokens.push({
              type: isSelfClosing ? TOK_SELF : TOK_OPEN,
              value: raw, tagName: tName, line: startLine, col: startCol
            });
            advance(gt + 1 - i);
          }
        } else {
          // 文本内容
          var nextTag = xml.indexOf('<', i);
          var text = nextTag === -1 ? xml.substring(i) : xml.substring(i, nextTag);
          if (text.length > 0) {
            tokens.push({ type: TOK_TEXT, value: text, line: startLine, col: startCol });
            advance(text.length);
          } else if (nextTag === -1) {
            break; // 不应该到这里
          }
        }
      }

      return tokens;
    }

    function errorAt(msg, line, col) {
      var e = new Error('第 ' + line + ' 行 第 ' + col + ' 列：' + msg);
      e.xmlLine = line; e.xmlCol = col;
      return e;
    }

    // ============================================================
    // XML Formatter — 缩进美化
    // ============================================================
    function formatXML(xml) {
      var tokens = tokenizeXML(xml);
      var indent = 0;
      var INDENT_STR = '  ';
      var lines = [];
      var tagStack = [];
      var prevType = null;

      for (var t = 0; t < tokens.length; t++) {
        var tok = tokens[t];

        if (tok.type === TOK_DECL || tok.type === TOK_PI) {
          lines.push(tok.value);
          continue;
        }

        if (tok.type === TOK_COMMENT) {
          lines.push(spaces(indent * 2) + tok.value);
          continue;
        }

        if (tok.type === TOK_CDATA) {
          lines.push(spaces(indent * 2) + tok.value);
          continue;
        }

        if (tok.type === TOK_TEXT) {
          var trimmed = tok.value.trim();
          if (trimmed) {
            lines.push(spaces(indent * 2) + trimmed);
            prevType = TOK_TEXT;
          }
          continue;
        }

        if (tok.type === TOK_SELF) {
          lines.push(spaces(indent * 2) + tok.value);
          prevType = TOK_SELF;
          continue;
        }

        if (tok.type === TOK_OPEN) {
          lines.push(spaces(indent * 2) + tok.value);
          tagStack.push(tok.tagName);
          indent++;
          prevType = TOK_OPEN;
          continue;
        }

        if (tok.type === TOK_CLOSE) {
          indent--;
          if (indent < 0) indent = 0;

          // 检查标签匹配
          if (tagStack.length > 0) {
            var expected = tagStack.pop();
            if (expected !== tok.tagName) {
              throw errorAt('标签不匹配：期望 </' + expected + '>，实际遇到 </' + tok.tagName + '>', tok.line, tok.col);
            }
          } else {
            throw errorAt('多余的闭合标签 </' + tok.tagName + '>，没有对应的开始标签', tok.line, tok.col);
          }

          // 如果前一个 token 是同级开始标签或文本，不缩进（紧凑显示）
          if (prevType === TOK_TEXT || prevType === TOK_SELF) {
            // 追加到上一行末尾
            lines[lines.length - 1] += tok.value;
          } else {
            lines.push(spaces(indent * 2) + tok.value);
          }
          prevType = TOK_CLOSE;
          continue;
        }
      }

      if (tagStack.length > 0) {
        throw new Error('XML 标签未闭合：<' + tagStack[tagStack.length - 1] + '> 缺少对应的结束标签');
      }

      return lines.join('\n');
    }

    function spaces(n) { return new Array(Math.max(0, n) + 1).join(' '); }

    // ============================================================
    // XML Compressor — 压缩精简
    // ============================================================
    function compressXML(xml) {
      var tokens = tokenizeXML(xml);
      var parts = [];
      for (var i = 0; i < tokens.length; i++) {
        var tok = tokens[i];
        if (tok.type === TOK_TEXT) {
          var t = tok.value.trim();
          if (t) parts.push(t);
        } else {
          parts.push(tok.value);
        }
      }
      return parts.join('');
    }

    // ============================================================
    // DOM
    // ============================================================
    var inputArea   = document.getElementById('input-area');
    var outputArea  = document.getElementById('output-area');
    var statusBar   = document.getElementById('status-bar');
    var inputStats  = document.getElementById('input-stats');
    var outputStats = document.getElementById('output-stats');
    var outputLabel = document.getElementById('output-label');
    var btnFormat   = document.getElementById('btn-format');
    var btnCompress = document.getElementById('btn-compress');
    var btnClear    = document.getElementById('btn-clear');
    var btnCopy     = document.getElementById('btn-copy');

    var STORAGE_KEY = 'xml_input';
    function loadInput() { try { var s = localStorage.getItem(STORAGE_KEY); if (s) inputArea.value = s; } catch(e) {} }
    function saveInput(v) { try { localStorage.setItem(STORAGE_KEY, v); } catch(e) {} }

    function updInputStats() {
      var v = inputArea.value, c = v.length, l = c === 0 ? 1 : v.split('\n').length;
      inputStats.textContent = t('xml.stats_format', { chars: c, lines: l });
    }
    function updOutputStats(text) {
      var v = text || '', c = v.length, l = c === 0 ? 1 : v.split('\n').length;
      outputStats.textContent = t('xml.stats_format', { chars: c, lines: l });
    }

    function updateOutputLabel() {
      if (!outputArea.value) {
        outputLabel.innerHTML = '<span class="text-text-muted">' + t('xml.status_waiting') + '</span>';
      }
    }

    // ============================================================
    // 操作
    // ============================================================
    function doFormat() {
      var input = inputArea.value;
      if (!input.trim()) { _currentStatus = { type: 'warning', key: 'xml.status_placeholder', params: null }; showStatus('warning', t('xml.status_placeholder')); return; }
      try {
        var out = formatXML(input);
        outputArea.value = out;
        outputLabel.innerHTML = '<span class="text-success">' + t('xml.status_formatted') + '</span>';
        updOutputStats(out);
        _currentStatus = { type: 'success', key: 'xml.status_formatted', params: null };
        showStatus('success', t('xml.status_formatted'));
      } catch (e) {
        outputArea.value = '';
        outputLabel.innerHTML = '<span class="text-error">' + t('xml.status_fmt_fail') + '</span>';
        updOutputStats('');
        _currentStatus = { type: 'error', key: 'xml.status_fmt_fail', params: null };
        showStatus('error', t('xml.status_fmt_fail') + ': ' + e.message);
      }
    }

    function doCompress() {
      var input = inputArea.value;
      if (!input.trim()) { _currentStatus = { type: 'warning', key: 'xml.status_placeholder', params: null }; showStatus('warning', t('xml.status_placeholder')); return; }
      try {
        var out = compressXML(input);
        outputArea.value = out;
        outputLabel.innerHTML = '<span class="text-success">' + t('xml.status_compressed', { chars: out.length }) + '</span>';
        updOutputStats(out);
        _currentStatus = { type: 'success', key: 'xml.status_compressed', params: { chars: out.length } };
        showStatus('success', t('xml.status_compressed', { chars: out.length }));
      } catch (e) {
        outputArea.value = '';
        outputLabel.innerHTML = '<span class="text-error">' + t('xml.status_cmp_fail') + '</span>';
        updOutputStats('');
        _currentStatus = { type: 'error', key: 'xml.status_cmp_fail', params: null };
        showStatus('error', t('xml.status_cmp_fail') + ': ' + e.message);
      }
    }

    function doClear() {
      inputArea.value = '';
      outputArea.value = '';
      outputLabel.innerHTML = '<span class="text-text-muted">' + t('xml.status_waiting') + '</span>';
      updInputStats(); updOutputStats(''); saveInput('');
      _currentStatus = { type: 'info', key: 'xml.status_cleared', params: null };
      showStatus('info', t('xml.status_cleared'));
      setActiveButton(btnFormat, [btnCompress]);
    }

    function doCopy() {
      var v = outputArea.value;
      if (!v) { _currentStatus = { type: 'warning', key: 'xml.status_placeholder', params: null }; showStatus('warning', t('xml.status_placeholder')); return; }
      var done = function () {
        var orig = btnCopy.textContent;
        btnCopy.textContent = t('xml.copy_done');
        btnCopy.classList.add('text-[#00B42A]', 'border-[#00B42A]');
        setTimeout(function () {
          btnCopy.textContent = orig;
          btnCopy.classList.remove('text-[#00B42A]', 'border-[#00B42A]');
        }, 1200);
        _currentStatus = { type: 'success', key: 'xml.copy_done', params: null };
        showStatus('success', t('xml.copy_done'));
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(v).then(done).catch(function () { fallbackCopy(v, done); });
      } else { fallbackCopy(v, done); }
    }

    function fallbackCopy(text, cb) {
      var ta = document.createElement('textarea'); ta.value = text;
      ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
      document.body.appendChild(ta); ta.focus(); ta.select();
      try { document.execCommand('copy'); cb(); } catch(e) {}
      document.body.removeChild(ta);
    }

    function showStatus(type, msg) {
      var icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
      var colors = { success: 'text-success', error: 'text-error', warning: 'text-[#FF7D00]', info: 'text-text-muted' };
      statusBar.innerHTML = '<span class="inline-flex items-center gap-1 ' + (colors[type] || '') + ' text-sm font-medium">' +
        (icons[type] || '') + ' ' + eHTML(msg) + '</span>';
    }
    function eHTML(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

    function setActiveButton(activeBtn, inactives) {
      activeBtn.classList.add('bg-primary', 'text-white', 'border-none');
      activeBtn.classList.remove('border', 'border-primary', 'text-primary', 'bg-white');
      for (var i = 0; i < inactives.length; i++) {
        inactives[i].classList.remove('bg-primary', 'text-white', 'border-none');
        inactives[i].classList.add('border', 'border-primary', 'text-primary', 'bg-white');
      }
    }

    // ============================================================
    // Init
    // ============================================================
    function init() {
      loadInput(); updInputStats(); updOutputStats('');
      inputArea.addEventListener('input', function () { updInputStats(); saveInput(inputArea.value); });

      btnFormat.addEventListener('click', function () { doFormat(); setActiveButton(btnFormat, [btnCompress]); });
      btnCompress.addEventListener('click', function () { doCompress(); setActiveButton(btnCompress, [btnFormat]); });
      btnClear.addEventListener('click', doClear);
      btnCopy.addEventListener('click', doCopy);

      inputArea.addEventListener('keydown', function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); doFormat(); setActiveButton(btnFormat, [btnCompress]); }
      });

      if (inputArea.value) { doFormat(); }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else { init(); }
  })();
  </script>
</body>
</html>
